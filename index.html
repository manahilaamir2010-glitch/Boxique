<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gilded Box | Curated Gifting</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --emerald: #1B4D3E; 
            --champagne: #E7D1B1; 
            --soft-white: #FCFAFA; 
            --dark-grey: #333;
        }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--soft-white); color: var(--dark-grey); }
        
        nav { display: flex; justify-content: center; align-items: center; padding: 30px 5%; background: white; }
        .logo { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--emerald); letter-spacing: 1px; }

        .hero { 
            height: 45vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('IMG_1707.jpeg');
            background-size: cover; background-position: center; 
        }

        .intro { text-align: center; padding: 60px 10%; }
        .intro h2 { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--emerald); margin-bottom: 10px; }
        .intro p { font-style: italic; color: #666; font-size: 1.1rem; }

        .gift-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 0 8% 100px; }
        .gift-card { background: white; border: 1px solid #eee; overflow: hidden; border-radius: 0; transition: 0.4s; text-align: center; padding-bottom: 30px; }
        .gift-card:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .image-container { width: 100%; height: 350px; overflow: hidden; }
        .gift-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gift-card:hover img { transform: scale(1.05); }

        .gift-card h3 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin: 25px 0 10px; color: var(--emerald); }
        .price { color: var(--dark-grey); font-weight: 500; font-size: 1.2rem; letter-spacing: 1px; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-top: 15px; display: block; }
